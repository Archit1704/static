name: deploy to EC2

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest
        
        steps:
            - name: ssh to EC2
              uses: appleboy/ssh-action@v0.1.10
              with:
                host: ${{ secrets.HOST }}
                username: ubuntu
                key: ${{ secrets.SSH_KEY }}
                script: |
                  cd /var/www/html/static
                  git pull origin main